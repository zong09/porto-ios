name: Porto
options:
  bundleIdPrefix: co.porto
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    INFOPLIST_KEY_UILaunchScreen_Generation: YES

packages:
  PortoKit:
    path: Packages/PortoKit
  PortoDesign:
    path: Packages/PortoDesign
  PortoForms:
    path: Packages/PortoForms
  FeatureAuth:
    path: Packages/FeatureAuth
  FeatureOverview:
    path: Packages/FeatureOverview
  FeaturePortfolios:
    path: Packages/FeaturePortfolios
  FeatureTransactions:
    path: Packages/FeatureTransactions
  FeatureDebt:
    path: Packages/FeatureDebt
  FeatureSettings:
    path: Packages/FeatureSettings

targets:
  Porto:
    type: application
    platform: iOS
    sources:
      - App/Porto
    configFiles:
      Debug: App/Config/Dev.xcconfig
      Release: App/Config/Prod.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.porto.ios
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Porto
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    info:
      path: App/Porto/Info.generated.plist
      properties:
        CFBundleDisplayName: Porto
        APIBaseURL: $(API_BASE_URL)
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: App/Porto/Porto.entitlements
    dependencies:
      - package: PortoKit
      - package: PortoDesign
      - package: PortoForms
      - package: FeatureAuth
      - package: FeatureOverview
      - package: FeaturePortfolios
      - package: FeatureTransactions
      - package: FeatureDebt
      - package: FeatureSettings
      - target: PortoWidgetExtension

  PortoWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - App/PortoWidget
    configFiles:
      Debug: App/Config/Dev.xcconfig
      Release: App/Config/Prod.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.porto.ios.widget
        GENERATE_INFOPLIST_FILE: YES
    info:
      path: App/PortoWidget/Info.generated.plist
      properties:
        CFBundleDisplayName: Porto
        APIBaseURL: $(API_BASE_URL)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: App/PortoWidget/PortoWidget.entitlements
    dependencies:
      - package: PortoKit
      - package: PortoDesign
